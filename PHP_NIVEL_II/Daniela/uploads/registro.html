<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - Foro Abierto</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        form { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 300px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

<form action="registro.php" method="POST" enctype="multipart/form-data">
    <h2>Crear Cuenta</h2>
    <input type="text" name="nombre" placeholder="Nombre" required>
    <input type="text" name="apellido" placeholder="Apellido" required>
    <input type="email" name="email" placeholder="Correo Electrónico" required>
    <input type="password" name="password" placeholder="Contraseña" required>
    
    <label for="foto">Foto de Perfil:</label>
    <input type="file" name="foto" id="foto" accept="image/*" required>
    
    <button type="submit">Registrarse</button>
    <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
</form>

</body>
</html>
