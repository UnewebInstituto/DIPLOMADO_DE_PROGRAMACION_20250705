<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Ubicación en el Mapa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        #map {
            width: 80%;
            height: 500px;
            margin: auto;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h1>Mostrar mi ubicación actual</h1>
    <button onclick="mostrarUbicacion()">📍 Ver dónde estoy</button>
    <div id="map"></div>

    <script>
        function mostrarUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const mapa = document.getElementById("map");
                    mapa.innerHTML = `
            <iframe
              width="100%"
              height="100%"
              frameborder="0"
              style="border:0"
              src="https://www.google.com/maps?q=${lat},${lon}&hl=es&z=15&output=embed"
              allowfullscreen>
            </iframe>
          `;
                }, function (error) {
                    alert("No se pudo obtener tu ubicación: " + error.message);
                });
            } else {
                alert("Tu navegador no soporta geolocalización.");
            }
        }
    </script>
</body>

</html>
