<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNEWEB - Agenda de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--<link rel="stylesheet" href="../../bootstrap/bootstrap.min.css">-->
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Registro de Contactos - UNEWEB</h3>
            </div>
            <div class="card-body">
                <form id="contactoForm">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Nombres</label>
                            <input type="text" id="nombres" class="form-control" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Apellidos</label>
                            <input type="text" id="apellidos" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tel. Habitación</label>
                            <input type="text" id="tel_hab" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tel. Trabajo</label>
                            <input type="text" id="tel_trab" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Tel. Celular</label>
                            <input type="text" id="tel_cel" class="form-control" required>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Correo Electrónico</label>
                            <input type="email" id="correo" class="form-control" required>
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-success w-100">Guardar Contacto</button>
                        </div>
                    </div>
                </form>
                <div id="mensaje" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
